<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Создание аккаунта — Merapob</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0a0f2a 0%, #0f172a 100%);
            color: #e2e8f0;
            line-height: 1.6;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 2rem;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        h1 {
            text-align: center;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 600;
            color: #cbd5e1;
        }

        input, select {
            width: 100%;
            padding: 0.8rem;
            border-radius: 16px;
            border: 1px solid #334155;
            background: #1e293b;
            color: white;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59,130,246,0.3);
        }

        .visibility-options {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .visibility-option {
            flex: 1;
            text-align: center;
        }

        .visibility-option input {
            display: none;
        }

        .visibility-option label {
            display: block;
            padding: 0.8rem;
            background: #1e293b;
            border-radius: 16px;
            cursor: pointer;
            border: 1px solid #334155;
            transition: all 0.2s;
            margin: 0;
        }

        .visibility-option input:checked + label {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }

        button {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 0.5rem;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .message {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 16px;
            text-align: center;
            display: none;
        }

        .message.success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid #22c55e;
            color: #4ade80;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #f87171;
        }

        .info {
            font-size: 0.8rem;
            color: #64748b;
            text-align: center;
            margin-top: 1.5rem;
        }

        hr {
            border-color: #334155;
            margin: 1.5rem 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Merapob</h1>
        <div class="subtitle">Создание аккаунта</div>

        <form id="accountForm">
            <div class="form-group">
                <label>👤 Имя аккаунта *</label>
                <input type="text" id="username" required placeholder="Например: Савва">
            </div>

            <div class="form-group">
                <label>🖼️ Ссылка на аватар (URL)</label>
                <input type="url" id="icon_url" placeholder="https://...">
            </div>

            <div class="form-group">
                <label>🔒 Секретный ключ (пароль) *</label>
                <input type="text" id="key" required placeholder="Придумайте пароль">
            </div>

            <div class="form-group">
                <label>📞 Контакт для связи (телефон/email)</label>
                <input type="text" id="contact" placeholder="+7... или email@...">
            </div>

            <div class="form-group">
                <label>👁️ Кто видит вас?</label>
                <div class="visibility-options">
                    <div class="visibility-option">
                        <input type="radio" name="visibility" id="vis1" value="1">
                        <label for="vis1">🔒 1 — Только кому написал</label>
                    </div>
                    <div class="visibility-option">
                        <input type="radio" name="visibility" id="vis2" value="2" checked>
                        <label for="vis2">🌍 2 — Всем</label>
                    </div>
                </div>
            </div>

            <button type="submit">🚀 Создать аккаунт</button>
        </form>

        <div id="message" class="message"></div>
        <div class="info">
            ⚠️ После создания аккаунт добавится в accounts.json<br>
            Приложение Merapob подтянет изменения автоматически
        </div>
    </div>

    <script>
        // Имя файла JSON (должен лежать рядом с этим HTML)
        const JSON_FILE = 'accounts.json';

        // Функция загрузки текущего JSON
        async function loadAccounts() {
            try {
                const response = await fetch(JSON_FILE);
                if (!response.ok) {
                    if (response.status === 404) {
                        return {}; // файла нет — вернём пустой объект
                    }
                    throw new Error(`Ошибка загрузки: ${response.status}`);
                }
                return await response.json();
            } catch (error) {
                console.warn('Загружаем пустой объект:', error);
                return {}; // при любой ошибке начинаем с пустого
            }
        }

        // Функция сохранения JSON (через GitHub API не получится просто так)
        // Показываем инструкцию для ручного копирования
        function showManualSave(newAccount, username) {
            const messageDiv = document.getElementById('message');
            
            // Загружаем текущий JSON, чтобы показать полный файл
            loadAccounts().then(existingAccounts => {
                const updatedAccounts = { ...existingAccounts, [username]: newAccount };
                const jsonStr = JSON.stringify(updatedAccounts, null, 2);
                
                messageDiv.innerHTML = `
                    <strong>✅ Аккаунт готов!</strong><br><br>
                    Скопируйте этот JSON и вставьте в файл <code>accounts.json</code> на GitHub:<br><br>
                    <textarea readonly style="width:100%; height:200px; background:#0f172a; color:#e2e8f0; border:1px solid #3b82f6; padding:0.5rem; border-radius:12px; font-family:monospace; font-size:0.8rem;">${jsonStr}</textarea>
                    <br><br>
                    📁 <strong>Инструкция:</strong><br>
                    1. Откройте репозиторий на GitHub<br>
                    2. Перейдите в файл <code>accounts.json</code><br>
                    3. Нажмите ✏️ Edit (карандаш)<br>
                    4. Замените содержимое на текст выше<br>
                    5. Нажмите Commit changes<br><br>
                    🔄 После этого приложение Merapob увидит нового пользователя!
                `;
                messageDiv.className = 'message success';
                messageDiv.style.display = 'block';
            });
        }

        // Обработка формы
        document.getElementById('accountForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const icon_url = document.getElementById('icon_url').value.trim();
            const key = document.getElementById('key').value.trim();
            const contact = document.getElementById('contact').value.trim();
            const visibility = document.querySelector('input[name="visibility"]:checked').value;

            if (!username) {
                showMessage('Введите имя аккаунта', 'error');
                return;
            }
            if (!key) {
                showMessage('Введите секретный ключ', 'error');
                return;
            }

            const newAccount = {
                icon_url: icon_url || '',
                visibility: visibility,
                key: key,
                contact: contact || ''
            };

            // Проверяем, не существует ли уже такой пользователь
            const existing = await loadAccounts();
            if (existing[username]) {
                showMessage(`Пользователь "${username}" уже существует!`, 'error');
                return;
            }

            // Показываем инструкцию для ручного сохранения
            showManualSave(newAccount, username);
        });

        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.innerHTML = text;
            msgDiv.className = `message ${type}`;
            msgDiv.style.display = 'block';
            setTimeout(() => {
                if (msgDiv.className !== 'message success') {
                    msgDiv.style.display = 'none';
                }
            }, 3000);
        }
    </script>
</body>
</html>
